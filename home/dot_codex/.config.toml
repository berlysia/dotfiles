allow_login_shell = false
approval_policy = 'on-request'
hide_agent_reasoning = true
model_reasoning_effort = 'high'
network_access = false
sandbox_mode = 'workspace-write'
web_search = 'live'

[mcp_servers]
[mcp_servers.context7]
args = ['@upstash/context7-mcp@latest']
command = 'npx'

[mcp_servers.playwright]
args = ['@playwright/mcp@latest']
command = 'npx'

[mcp_servers.readability]
args = ['@mizchi/readability@latest', '--mcp']
command = 'npx'

[shell_environment_policy]
include_only = ['EDITOR', 'GIT_AUTHOR_EMAIL', 'GIT_AUTHOR_NAME', 'GIT_COMMITTER_EMAIL', 'GIT_COMMITTER_NAME', 'HOME', 'LANG', 'LC_ALL', 'NODE_ENV', 'NODE_OPTIONS', 'NPM_CONFIG_REGISTRY', 'PATH', 'SHELL', 'TERM', 'TMPDIR', 'USER', 'XDG_CACHE_HOME', 'XDG_CONFIG_HOME', 'XDG_DATA_HOME']
inherit = 'none'
