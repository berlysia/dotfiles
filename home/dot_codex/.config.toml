allow_login_shell = false
approval_policy = 'on-request'
hide_agent_reasoning = true
model_reasoning_effort = 'high'
network_access = true
sandbox_mode = 'workspace-write'
web_search = 'live'

[mcp_servers]
[mcp_servers.context7]
args = ['@upstash/context7-mcp@latest']
command = 'npx'

[mcp_servers.playwright]
args = ['@playwright/mcp@latest']
command = 'npx'

[mcp_servers.readability]
args = ['@mizchi/readability@latest', '--mcp']
command = 'npx'

[sandbox_workspace_write]
writable_roots = ['__CHEZMOI_HOME__/.cache/mise']

[shell_environment_policy]
include_only = [
  'EDITOR',
  'GIT_AUTHOR_EMAIL',
  'GIT_AUTHOR_NAME',
  'GIT_COMMITTER_EMAIL',
  'GIT_COMMITTER_NAME',
  'HOME',
  'LANG',
  'LC_ALL',
  'NODE_ENV',
  'NODE_OPTIONS',
  'NPM_CONFIG_REGISTRY',
  'PATH',
  'SHELL',
  'TERM',
  'TMPDIR',
  'USER',
  'XDG_CACHE_HOME',
  'XDG_CONFIG_HOME',
  'XDG_DATA_HOME',
]
inherit = 'none'

[shell_environment_policy.set]
PATH = '__CHEZMOI_HOME__/.local/share/mise/shims:__CHEZMOI_HOME__/.cargo/bin:/snap/bin:__CHEZMOI_HOME__/.local/share/pnpm:__CHEZMOI_HOME__/go/bin:__CHEZMOI_HOME__/workspace/depot_tools:__CHEZMOI_HOME__/google-cloud-sdk/bin:__CHEZMOI_HOME__/.moon/bin:__CHEZMOI_HOME__/.deno/bin:__CHEZMOI_HOME__/.local/.bin:__CHEZMOI_HOME__/.local/bin:/bin:/usr/bin:/usr/ucb:/usr/local/bin'
