workspace_mode = "worktree"
local_skip_actions = ["actions/checkout"]
trust_actions = true
include_dirty = true

[affected.".github/workflows/ci-typescript.yml"]
patterns = [
  "**/*.ts",
  "package.json",
  "pnpm-lock.yaml",
  "tsconfig.json",
  ".oxfmtrc.json",
  ".oxlintrc.json",
  ".github/workflows/ci-typescript.yml",
  ".github/actions/setup-node-pnpm/**",
]

[affected.".github/workflows/validate-codex-config.yml"]
patterns = [
  "home/dot_codex/.config.toml",
  "scripts/check-codex-config.sh",
  "scripts/format-codex-config.sh",
  ".github/workflows/validate-codex-config.yml",
  ".github/actions/setup-node-pnpm/**",
  "package.json",
  "pnpm-lock.yaml",
]

[affected.".github/workflows/ci-shellcheck.yml"]
patterns = ["**/*.sh", ".shellcheckrc", ".github/workflows/ci-shellcheck.yml"]
