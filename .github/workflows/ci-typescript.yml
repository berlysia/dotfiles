name: TypeScript CI

on:
  push:
    branches: [master, main]
    paths:
      - "**/*.ts"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".oxfmtrc.json"
      - ".oxlintrc.json"
      - ".github/workflows/ci-typescript.yml"
      - ".github/actions/setup-node-bun/**"
  pull_request:
    branches: [master, main]
    paths:
      - "**/*.ts"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".oxfmtrc.json"
      - ".oxlintrc.json"
      - ".github/workflows/ci-typescript.yml"
      - ".github/actions/setup-node-bun/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js with bun
        uses: ./.github/actions/setup-node-bun

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Lint check
        run: bun run format:check && bun run lint:oxlint
