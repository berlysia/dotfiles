name: Validate Codex Config

on:
  push:
    branches:
      - master
      - main
    paths:
      - "home/dot_codex/.config.toml"
      - "home/dot_codex/.config.*.toml"
      - "scripts/check-codex-config.sh"
      - "scripts/format-codex-config.sh"
      - ".github/workflows/validate-codex-config.yml"
  pull_request:
    paths:
      - "home/dot_codex/.config.toml"
      - "home/dot_codex/.config.*.toml"
      - "scripts/check-codex-config.sh"
      - "scripts/format-codex-config.sh"
      - ".github/workflows/validate-codex-config.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js with bun
        uses: ./.github/actions/setup-node-bun

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
          reshim: true

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh

      - name: Validate Codex config formatting
        run: ./scripts/check-codex-config.sh
